name: Deploy

# Deploys AXIOMN to Fly.io. Runs on every push to main (i.e. after a PR merges)
# and can be triggered manually. Requires one repo secret, FLY_API_TOKEN
# (create with `fly tokens create deploy`); the app's runtime secrets
# (ANTHROPIC_API_KEY, OPENAI_API_KEY, AXIOMN_API_KEYS, AXIOMN_REQUIRE_REAL_PROVIDER,
# ...) are set out-of-band with `fly secrets set`, never here.
#
# Config lives in fly.toml (app = 'axiomn', internal_port 8000, health check on
# /v1/health) — this workflow only carries the deploy trigger and credentials.
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  # Never let two deploys race; a newer push supersedes an in-flight one.
  group: deploy-fly
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # Skip cleanly (green, not red) until FLY_API_TOKEN is configured, so an
      # unconfigured repo doesn't show a permanent failing check on main. The
      # token is read into an env var and only tested for emptiness — never
      # echoed — so it can't leak into logs.
      - name: Check for deploy token
        id: check
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          if [ -z "$FLY_API_TOKEN" ]; then
            echo "::notice::FLY_API_TOKEN not set — skipping deploy. Add it with 'fly tokens create deploy' to enable auto-deploy."
            echo "deploy=false" >> "$GITHUB_OUTPUT"
          else
            echo "deploy=true" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/checkout@v4
        if: steps.check.outputs.deploy == 'true'
      - uses: superfly/flyctl-actions/setup-flyctl@master
        if: steps.check.outputs.deploy == 'true'
      - name: Deploy
        if: steps.check.outputs.deploy == 'true'
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
