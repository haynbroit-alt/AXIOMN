name: Deploy

# Deploys AXIOMN to Fly.io. Runs on every push to main (i.e. after a PR merges)
# and can be triggered manually. Requires one repo secret, FLY_API_TOKEN
# (create with `fly tokens create deploy`); the app's runtime secrets
# (ANTHROPIC_API_KEY, OPENAI_API_KEY, AXIOMN_API_KEYS, AXIOMN_REQUIRE_REAL_PROVIDER,
# ...) are set out-of-band with `fly secrets set`, never here.
#
# Config lives in fly.toml (app = 'axiomn', internal_port 8000, health check on
# /v1/health) — this workflow only carries the deploy trigger and credentials.
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  # Never let two deploys race; a newer push supersedes an in-flight one.
  group: deploy-fly
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    # No-op instead of a hard failure on forks/clones without the secret set.
    if: ${{ github.repository == 'haynbroit-alt/AXIOMN' }}
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
