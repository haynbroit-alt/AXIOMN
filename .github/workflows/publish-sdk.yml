name: Publish SDK

# Publishes axiomn-sdk to PyPI. Fires only on an explicit `sdk-vX.Y.Z` tag
# (or a manual run), so day-to-day pushes never publish. Uses PyPI Trusted
# Publishing (OIDC) — no API token stored in the repo. Before the first run:
#   1. Declare a license in sdk/pyproject.toml (+ a LICENSE file).
#   2. On PyPI, add this repo/workflow as a trusted publisher for axiomn-sdk.
on:
  push:
    tags:
      - "sdk-v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade build
          python -m build sdk/ --outdir dist/
      - name: Check metadata
        run: |
          python -m pip install --upgrade twine
          twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # required for Trusted Publishing (OIDC)
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
