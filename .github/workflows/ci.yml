name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements-dev.txt
          pip install -e .
          pip install -e sdk/

      - name: Lint
        run: ruff check axiomn sdk tests

      - name: Test with coverage floor
        run: pytest -q --cov=axiomn --cov=sdk/axiomn_sdk --cov-fail-under=90

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t axiomn:ci .

      - name: Smoke test the container
        run: |
          docker run -d --rm -p 8000:8000 --name axiomn-ci axiomn:ci
          for i in $(seq 1 20); do
            if curl -sf http://127.0.0.1:8000/v1/health > /dev/null; then break; fi
            sleep 1
          done
          curl -sf -X POST http://127.0.0.1:8000/v1/intent \
            -H "Content-Type: application/json" \
            -d '{"text": "Explain how black holes form"}' | grep -q '"route"'
          docker stop axiomn-ci
