<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<title>AXIOMN — Decision Graph</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
  :root {
    color-scheme: dark;
    --bg:#0a0c11; --panel:#11141d; --panel2:#151a25; --border:#232a38;
    --ink:#e7eaf2; --muted:#8b93a6; --faint:#5c6478;
    --accent:#5b8cff; --teal:#22d3ee; --purple:#a855f7; --good:#46d19e; --amber:#e6a94b;
  }
  * { box-sizing:border-box; }
  body { margin:0; background:
      radial-gradient(1200px 500px at 70% -10%, rgba(91,140,255,.10), transparent 60%),
      radial-gradient(900px 500px at 10% 0%, rgba(168,85,247,.08), transparent 55%), var(--bg);
    color:var(--ink); font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;
    line-height:1.5; min-height:100vh; }
  .wrap { max-width:1180px; margin:0 auto; padding:28px 20px 64px; }
  .mono { font-family:ui-monospace,"SF Mono",Menlo,monospace; }
  .num { font-variant-numeric:tabular-nums; }

  header { display:flex; align-items:baseline; gap:16px; margin-bottom:22px; flex-wrap:wrap; }
  .logo { font-size:1.5rem; font-weight:800; letter-spacing:-.02em; }
  .logo b { color:var(--accent); }
  header .tag { color:var(--muted); font-size:.9rem; }

  form { display:flex; gap:8px; }
  input[type=text] { flex:1; background:var(--panel); border:1px solid var(--border); color:var(--ink);
    border-radius:11px; padding:14px 16px; font-size:1.02rem; }
  input[type=text]:focus { outline:2px solid var(--accent); }
  .mic, .go { border:1px solid var(--border); border-radius:11px; cursor:pointer; font-size:1rem; }
  .mic { background:var(--panel); color:var(--ink); padding:0 15px; display:none; }
  .go { background:var(--accent); color:#fff; border-color:transparent; padding:0 22px; font-weight:600; }
  .go:disabled { opacity:.5; cursor:default; }
  .key { margin-top:8px; width:100%; background:var(--panel); border:1px solid var(--border);
    color:var(--muted); border-radius:9px; padding:8px 14px; font-size:.82rem; }

  #err { display:none; margin-top:16px; color:#ff7a7a; background:rgba(255,80,80,.08);
    border:1px solid rgba(255,80,80,.25); border-radius:10px; padding:12px 14px; font-size:.9rem; }

  #out { display:none; margin-top:26px; }

  /* stat tiles */
  .tiles { display:grid; grid-template-columns:repeat(6,1fr); gap:12px; }
  @media (max-width:820px){ .tiles{ grid-template-columns:repeat(3,1fr);} }
  @media (max-width:480px){ .tiles{ grid-template-columns:repeat(2,1fr);} }
  .tile { background:var(--panel); border:1px solid var(--border); border-radius:13px; padding:13px 14px; }
  .tile .l { font-size:.66rem; letter-spacing:.09em; text-transform:uppercase; color:var(--faint); }
  .tile .v { font-size:1.35rem; font-weight:700; margin-top:4px; letter-spacing:-.01em; }
  .tile .s { font-size:.72rem; color:var(--muted); margin-top:2px; }
  .tile .v.good { color:var(--good); } .tile .v.tealc { color:var(--teal); }

  /* execution graph */
  .section-h { font-size:.72rem; letter-spacing:.12em; text-transform:uppercase; color:var(--muted);
    margin:26px 0 12px; }
  .graph { display:flex; align-items:stretch; gap:0; overflow-x:auto; padding:4px 2px 10px; }
  .node { flex:1 0 150px; background:var(--panel); border:1px solid var(--border); border-radius:13px;
    padding:13px 14px; position:relative; opacity:.38; transform:translateY(4px);
    transition:opacity .35s ease, transform .35s ease, border-color .35s ease, box-shadow .35s ease; }
  .node.on { opacity:1; transform:translateY(0); border-color:var(--nc,var(--accent));
    box-shadow:0 0 0 1px var(--nc,var(--accent)), 0 8px 26px rgba(91,140,255,.14); }
  .node .step { font-family:ui-monospace,Menlo,monospace; font-size:.66rem; color:var(--faint); }
  .node .name { font-weight:700; font-size:.82rem; margin-top:4px; letter-spacing:.02em; }
  .node .desc { font-size:.72rem; color:var(--muted); margin-top:2px; min-height:1.6em; }
  .node .val { font-family:ui-monospace,Menlo,monospace; font-size:.8rem; margin-top:7px; color:var(--nc,var(--accent));
    opacity:0; transition:opacity .3s ease .1s; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .node.on .val { opacity:1; }
  .edge { flex:0 0 26px; align-self:center; height:2px; background:var(--border); position:relative; }
  .edge.flow { background:linear-gradient(90deg,var(--accent),var(--teal)); }
  .edge.flow::after { content:""; position:absolute; top:-2px; left:0; width:6px; height:6px; border-radius:50%;
    background:var(--teal); box-shadow:0 0 8px var(--teal); animation:travel 1s ease forwards; }
  @keyframes travel { from{ left:0; opacity:1;} to{ left:100%; opacity:.2;} }
  @media (prefers-reduced-motion:reduce){ .node{ transition:none;} .edge.flow::after{ animation:none; display:none;} }

  /* panels */
  .cols { display:grid; grid-template-columns:1.3fr 1fr; gap:16px; margin-top:8px; }
  @media (max-width:820px){ .cols{ grid-template-columns:1fr;} }
  .panel { background:var(--panel); border:1px solid var(--border); border-radius:14px; padding:18px; }
  .panel h3 { margin:0 0 10px; font-size:.72rem; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); }
  #answer { white-space:pre-wrap; line-height:1.6; }
  .why .hl { font-weight:700; margin-bottom:6px; }
  .why .li { font-size:.9rem; color:var(--muted); padding:7px 0; border-top:1px solid var(--border); }
  .why .li b { color:var(--ink); font-weight:600; }
  .why .doubt { color:var(--amber); }
  .badge { display:inline-block; font-family:ui-monospace,Menlo,monospace; font-size:.7rem; padding:2px 8px;
    border-radius:999px; background:var(--panel2); color:var(--muted); border:1px solid var(--border); }
  footer { margin-top:34px; color:var(--faint); font-size:.78rem; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="logo">AXIOM<b>N</b></div>
    <div class="tag">Ask anything. <b style="color:var(--ink)">See how it decided to answer.</b></div>
  </header>

  <form id="f">
    <input id="q" type="text" placeholder="Construis-moi un business rentable basé sur l'IA…" autocomplete="off" />
    <button id="mic" class="mic" type="button" title="Parler" aria-label="Voice">🎤</button>
    <button id="go" class="go" type="submit">Ask</button>
  </form>
  <input id="key" class="key" type="password" placeholder="API key (seulement si ce serveur en exige une)" autocomplete="off" />

  <div id="err"></div>

  <div id="out">
    <div class="tiles" id="tiles"></div>

    <div class="section-h">Execution graph</div>
    <div class="graph" id="graph"></div>

    <div class="cols">
      <div class="panel"><h3>Réponse</h3><div id="answer"></div></div>
      <div class="panel why"><h3>Pourquoi cette décision</h3><div id="why"></div></div>
    </div>
  </div>

  <footer>AXIOMN · le coût et l'économie sont mesurés sur cette requête, pas promis. <span class="mono">POST /v1/intent</span></footer>
</div>

<script>
  const $ = (id) => document.getElementById(id);
  const f=$("f"), q=$("q"), go=$("go"), keyEl=$("key"), err=$("err"), out=$("out");

  keyEl.value = localStorage.getItem("axiomn_api_key") || "";
  keyEl.addEventListener("change", () => localStorage.setItem("axiomn_api_key", keyEl.value.trim()));
  const headers = (extra) => { const h = extra||{}; const k = keyEl.value.trim(); if (k) h["X-API-Key"]=k; return h; };

  // Voice in/out, like the minimal demo.
  const micBtn=$("mic"), Rec=window.SpeechRecognition||window.webkitSpeechRecognition;
  if (Rec) { micBtn.style.display="block"; const r=new Rec(); r.lang=navigator.language||"fr-FR"; r.interimResults=false;
    r.onresult=(e)=>{ q.value=e.results[0][0].transcript; micBtn.textContent="🎤"; f.requestSubmit(); };
    r.onerror=()=>micBtn.textContent="🎤"; r.onend=()=>micBtn.textContent="🎤";
    micBtn.addEventListener("click",()=>{ micBtn.textContent="🔴"; r.start(); }); }
  const speak=(t,l)=>{ if(!("speechSynthesis" in window)||!t)return; const u=new SpeechSynthesisUtterance(t);
    if(l)u.lang=l; speechSynthesis.cancel(); speechSynthesis.speak(u); };

  const NODES = [
    { step:"01", name:"INTENT",       desc:"Détection de l'intention", color:"var(--teal)",   val:d=>d.intent },
    { step:"02", name:"ANALYZE",      desc:"Valeur & difficulté",       color:"var(--accent)", val:d=>`value ${d.value} · diff ${d.difficulty}/10` },
    { step:"03", name:"ROUTE",        desc:"Sélection de la route",     color:"var(--purple)", val:d=>d.route },
    { step:"04", name:"SELECT MODEL", desc:"Choix du modèle",           color:"var(--amber)",  val:d=>d.model||"local" },
    { step:"05", name:"TOOL",         desc:"Outil",                     color:"var(--accent)", val:d=>d.tool },
    { step:"06", name:"EXECUTE",      desc:"Exécution",                 color:"var(--teal)",   val:d=>`quality ${d.quality}` },
    { step:"07", name:"ACTION",       desc:"Action post-réponse",       color:"var(--good)",   val:d=>d.action.type },
  ];

  function buildGraph() {
    const g=$("graph"); g.innerHTML="";
    NODES.forEach((n,i)=>{
      if (i>0){ const e=document.createElement("div"); e.className="edge"; e.dataset.i=i; g.appendChild(e); }
      const el=document.createElement("div"); el.className="node"; el.dataset.i=i; el.style.setProperty("--nc",n.color);
      el.innerHTML=`<div class="step">${n.step}</div><div class="name">${n.name}</div><div class="desc">${n.desc}</div><div class="val"></div>`;
      g.appendChild(el);
    });
  }

  function animate(data) {
    const nodes=[...document.querySelectorAll(".node")], edges=[...document.querySelectorAll(".edge")];
    nodes.forEach(n=>n.classList.remove("on")); edges.forEach(e=>e.classList.remove("flow"));
    NODES.forEach((n,i)=>{
      setTimeout(()=>{
        if (i>0){ const e=edges.find(x=>+x.dataset.i===i); if(e)e.classList.add("flow"); }
        const el=nodes[i]; el.querySelector(".val").textContent=n.val(data); el.classList.add("on");
      }, i*140);
    });
  }

  function esc(s){ const d=document.createElement("div"); d.textContent=s==null?"":String(s); return d.innerHTML; }

  function render(d) {
    const saved = Math.max(0, d.baseline_cost - d.cost);
    const rate = d.baseline_cost>0 ? Math.round(100*saved/d.baseline_cost) : 0;
    $("tiles").innerHTML = `
      <div class="tile"><div class="l">Temps</div><div class="v num">${d.execution_time_ms}<span class="s"> ms</span></div></div>
      <div class="tile"><div class="l">Coût</div><div class="v num">${d.cost}</div><div class="s">vs ${d.baseline_cost} premium</div></div>
      <div class="tile"><div class="l">Économie</div><div class="v good num">${rate}%</div><div class="s">${saved.toFixed(4)} économisé</div></div>
      <div class="tile"><div class="l">Valeur</div><div class="v tealc num">${d.value}</div><div class="s">demande ${d.demand}/10</div></div>
      <div class="tile"><div class="l">Qualité</div><div class="v num">${d.quality}</div><div class="s">${esc(d.quality_reason)}</div></div>
      <div class="tile"><div class="l">Confiance</div><div class="v num">${d.confidence}</div><div class="s">ambig. ${d.ambiguity}</div></div>`;

    const ex = d.explanation || {};
    const budgetLine = d.budget && d.budget.downgraded
      ? `<div class="li"><b>Budget :</b> <span class="doubt">${esc(d.budget.note)}</span></div>` : "";
    $("why").innerHTML = `
      <div class="hl">${esc(ex.headline||"")}</div>
      <div class="li">${esc(ex.why||"")}</div>
      <div class="li"><b>Confiance —</b> ${esc(ex.confidence_note||"")}</div>
      ${ex.doubt ? `<div class="li doubt">${esc(ex.doubt)}</div>` : ""}
      <div class="li"><b>Coût —</b> ${esc(ex.tradeoff||"")}</div>
      ${budgetLine}
      <div style="margin-top:10px"><span class="badge">${esc(d.route)}</span> <span class="badge">${esc(d.model||d.tool)}</span></div>`;

    const awaiting = d.action.type==="await_human";
    $("answer").textContent = awaiting ? `⏳ ${d.result}` : d.result;
    if (d.action.type==="voice_reply") speak(d.result, d.language);
    animate(d);
  }

  buildGraph();
  f.addEventListener("submit", async (e)=>{
    e.preventDefault(); const text=q.value.trim(); if(!text) return;
    go.disabled=true; err.style.display="none";
    try {
      const res = await fetch("/v1/intent", { method:"POST", headers:headers({"Content-Type":"application/json"}), body:JSON.stringify({text}) });
      if (res.status===401) throw new Error("ce serveur exige une clé API — saisis-la dans le champ ci-dessus.");
      if (res.status===429) throw new Error("limite de débit atteinte — réessaie dans une minute.");
      if (!res.ok) throw new Error("HTTP "+res.status);
      out.style.display="block";
      render(await res.json());
      out.scrollIntoView({behavior:"smooth", block:"nearest"});
    } catch(ex) {
      err.textContent = "Erreur : "+ex.message; err.style.display="block";
    } finally { go.disabled=false; }
  });
</script>
</body>
</html>
