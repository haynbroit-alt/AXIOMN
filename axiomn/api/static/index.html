<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>AXIOMN</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
  :root { color-scheme: dark; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #0b0d12;
    color: #e6e9ef;
    display: flex;
    justify-content: center;
    padding: 48px 16px;
  }
  main { width: 100%; max-width: 640px; }
  h1 { font-size: 1.4rem; font-weight: 600; letter-spacing: 0.02em; margin-bottom: 4px; }
  p.tagline { color: #8b92a5; margin-top: 0; margin-bottom: 28px; }
  form { display: flex; gap: 8px; }
  input[type="text"] {
    flex: 1;
    background: #151823;
    border: 1px solid #2a2f3d;
    color: #e6e9ef;
    border-radius: 8px;
    padding: 12px 14px;
    font-size: 1rem;
  }
  input[type="text"]:focus { outline: 2px solid #5b8cff; }
  button {
    background: #5b8cff;
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 0 20px;
    font-size: 1rem;
    cursor: pointer;
  }
  button:disabled { opacity: 0.5; cursor: default; }
  #answer {
    margin-top: 28px;
    background: #151823;
    border: 1px solid #2a2f3d;
    border-radius: 10px;
    padding: 18px;
    display: none;
    white-space: pre-wrap;
    line-height: 1.5;
  }
  #thought {
    margin-top: 14px;
    display: none;
    font-size: 0.85rem;
    color: #9aa3b8;
    border-left: 2px solid #2a2f3d;
    padding-left: 12px;
  }
  #thought div { margin-bottom: 3px; }
  #thought b { color: #d7dbe6; }
  #error { margin-top: 20px; color: #ff6b6b; display: none; }
</style>
</head>
<body>
<main>
  <h1>AXIOMN</h1>
  <p class="tagline">Ask anything. See how it decided to answer.</p>

  <form id="ask-form">
    <input id="text" type="text" placeholder="Explique-moi les trous noirs..." autocomplete="off" />
    <button id="submit" type="submit">Ask</button>
  </form>
  <input id="api-key" type="password" placeholder="API key (only if this server requires one)"
         autocomplete="off" style="margin-top:8px;width:100%;box-sizing:border-box;background:#151823;border:1px solid #2a2f3d;color:#e6e9ef;border-radius:8px;padding:8px 14px;font-size:0.85rem;" />

  <div id="answer"></div>
  <div id="thought"></div>
  <div id="error"></div>
</main>

<script>
  const form = document.getElementById("ask-form");
  const input = document.getElementById("text");
  const submitBtn = document.getElementById("submit");
  const answerEl = document.getElementById("answer");
  const thoughtEl = document.getElementById("thought");
  const errorEl = document.getElementById("error");
  const apiKeyEl = document.getElementById("api-key");

  // Deployments with AXIOMN_API_KEYS set require X-API-Key; remember the
  // key in this browser so the demo stays usable after a reload.
  apiKeyEl.value = localStorage.getItem("axiomn_api_key") || "";
  apiKeyEl.addEventListener("change", () => {
    localStorage.setItem("axiomn_api_key", apiKeyEl.value.trim());
  });
  function headers(extra) {
    const h = extra || {};
    const key = apiKeyEl.value.trim();
    if (key) h["X-API-Key"] = key;
    return h;
  }

  let pollTimer = null;

  // The async half of the human route: keep checking the ticket until a
  // human answers, then swap the "queued" placeholder for the real answer.
  function pollTicket(statusUrl) {
    pollTimer = setInterval(async () => {
      try {
        const response = await fetch(statusUrl, { headers: headers() });
        if (!response.ok) return;
        const ticket = await response.json();
        if (ticket.status === "answered") {
          clearInterval(pollTimer);
          pollTimer = null;
          answerEl.textContent = `🧑‍🏫 ${ticket.answer}`;
        }
      } catch (_) { /* transient network error: keep polling */ }
    }, 2000);
  }

  form.addEventListener("submit", async (event) => {
    event.preventDefault();
    const text = input.value.trim();
    if (!text) return;

    submitBtn.disabled = true;
    errorEl.style.display = "none";
    answerEl.style.display = "none";
    thoughtEl.style.display = "none";
    if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }

    try {
      const response = await fetch("/v1/intent", {
        method: "POST",
        headers: headers({ "Content-Type": "application/json" }),
        body: JSON.stringify({ text }),
      });
      if (response.status === 401) {
        throw new Error("this server requires an API key — enter yours in the field below the search box");
      }
      if (response.status === 429) {
        throw new Error("rate limit reached — wait a minute and try again");
      }
      if (!response.ok) throw new Error(`HTTP ${response.status}`);
      const data = await response.json();

      const awaiting = data.action.type === "await_human";
      answerEl.textContent = awaiting ? `⏳ ${data.result}` : data.result;
      answerEl.style.display = "block";
      if (awaiting && data.action.payload.status_url) {
        pollTicket(data.action.payload.status_url);
      }

      const ticketLine = awaiting && data.action.payload.ticket_id
        ? `<div><b>Ticket:</b> ${data.action.payload.ticket_id}</div>`
        : "";
      const modelLine = data.model
        ? `<div><b>Model:</b> ${data.model} &mdash; ${data.model_reason || ""}</div>`
        : "";
      thoughtEl.innerHTML = `
        <div><b>Intent:</b> ${data.intent} (confidence ${data.confidence}, ambiguity ${data.ambiguity})</div>
        <div><b>Language:</b> ${data.language} &middot; <b>Difficulty:</b> ${data.difficulty}/10</div>
        <div><b>Route:</b> ${data.route} &middot; <b>Tool:</b> ${data.tool}</div>
        ${modelLine}
        <div><b>Action:</b> ${data.action.type}</div>
        <div><b>Execution time:</b> ${data.execution_time_ms} ms</div>
        ${ticketLine}
      `;
      thoughtEl.style.display = "block";
    } catch (err) {
      errorEl.textContent = "Something went wrong: " + err.message;
      errorEl.style.display = "block";
    } finally {
      submitBtn.disabled = false;
    }
  });
</script>
</body>
</html>
